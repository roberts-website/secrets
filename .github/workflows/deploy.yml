name: Build and deploy to CapRover

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on CapRover
        run: |
          docker run --rm caprover/cli-caprover:latest caprover deploy \
            --caproverUrl "$CAPROVER_SERVER" \
            --appToken "$CAPROVER_APP_TOKEN" \
            --appName "$CAPROVER_APP" \
            --imageName "ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}:${GITHUB_SHA}"
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP: ${{ secrets.CAPROVER_APP }}
          CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}